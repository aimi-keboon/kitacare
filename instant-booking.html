    <style>
        /* ── ROOT & RESET ─────────────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --blue: #184AB7;
            --blue-dark: #0F3285;
            --blue-pale: #E8F0FE;
            --sky: #F4F7FA;
            --white: #FFFFFF;
            --text: #1A1C20;
            --text-mid: #4A4D55;
            --border: #DDE3EE;
            --radius-lg: 24px;
            --font-head: 'Plus Jakarta Sans', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            --nav-h: 64px;
        }

        body {
            font-family: var(--font-body);
            color: var(--text);
            background: var(--sky);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 800px; margin: 0 auto; padding: 0 20px; }
        
        /* ── MOBILE FRIENDLY NAV ─────────────────────────────────────────────── */
        nav {
            position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h);
            z-index: 1000; background: white; border-bottom: 1px solid var(--border);
            display: flex; align-items: center;
        }
        .nav-inner { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .nav-logo img { height: 30px; width: auto; }
        .btn-cancel { 
            font-size: 11px; font-weight: 800; color: #ff4d4d; 
            text-decoration: none; border: 1.5px solid #ff4d4d; 
            padding: 6px 14px; border-radius: 50px; text-transform: uppercase;
        }

        /* ── BOOKING FORM ────────────────────────────────────────────────────── */
        .main-content { padding-top: calc(var(--nav-h) + 30px); padding-bottom: 60px; }
        
        .booking-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 35px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            border: 1px solid var(--border);
        }

        h1 { font-family: var(--font-head); font-size: 24px; font-weight: 800; margin-bottom: 8px; }
        .subtitle { color: var(--text-mid); font-size: 14px; margin-bottom: 30px; }

        h3 { 
            font-family: var(--font-head); font-size: 12px; text-transform: uppercase; 
            letter-spacing: 1.2px; color: var(--blue); margin: 35px 0 15px 0; 
            border-bottom: 2px solid var(--blue-pale); padding-bottom: 5px;
        }

        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 11px; font-weight: 700; color: #666; margin-bottom: 6px; text-transform: uppercase; }
        
        input, select, textarea { 
            width: 100%; height: 52px; padding: 12px 16px; 
            border: 1px solid var(--border); border-radius: 12px; 
            font-size: 16px; 
            font-family: var(--font-body); background: #fafafa;
            outline: none;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--blue); background: #fff; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* SLOTS AREA */
        .slot-row { 
            display: grid; grid-template-columns: 1fr 80px 44px; 
            gap: 10px; margin-bottom: 12px; align-items: flex-end; 
        }

        .btn-add { 
            width: 100%; padding: 15px; background: #f0f7ff; color: var(--blue); 
            font-size: 13px; font-weight: 700; border: 1px dashed var(--blue); 
            border-radius: 12px; cursor: pointer; margin-top: 10px;
        }

        .price-box { 
            background: var(--blue-dark); color: white; padding: 25px; 
            border-radius: 16px; text-align: center; margin: 30px 0;
        }
        .price-box span { font-size: 11px; text-transform: uppercase; opacity: 0.8; letter-spacing: 1px; }
        .total-price { font-family: var(--font-head); font-size: 32px; font-weight: 800; margin-top: 5px; }

        .btn-submit { 
            width: 100%; padding: 20px; background: var(--blue); color: white; 
            font-size: 16px; font-weight: 800; border-radius: 50px; border: none;
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .btn-submit:active { transform: scale(0.98); background: var(--blue-dark); }

        /* ── MOBILE FIXES ────────────────────────────────────────────────────── */
        @media (max-width: 600px) {
            .grid-2 { grid-template-columns: 1fr; gap: 0; }
            .slot-row { grid-template-columns: 1fr 70px 40px; gap: 8px; }
            .booking-card { padding: 25px 15px; border-radius: 0; border: none; margin: -20px; }
            h1 { font-size: 22px; }

<body>

    <nav>
        <div class="container nav-inner">
            <a href="index.html" class="nav-logo">
                <img src="kitacare.png" alt="KitaCare">
            </a>
            <a href="javascript:void(0)" class="btn-cancel" onclick="history.back();">Back</a>
        </div>
    </nav>

    <div class="main-content">
        <div class="container">
            <div class="booking-card">
                <h1>Instant Booking</h1>
                <p class="subtitle">Secure a professional caregiver or nurse in minutes.</p>

                <h3>1. Contact Person</h3>
                <div class="input-group"><label>Full Name</label><input type="text" id="u-name" placeholder="Name for contact"></div>
                <div class="grid-2">
                    <div class="input-group"><label>Email</label><input type="email" id="u-email" placeholder="Email for receipt"></div>
                    <div class="input-group"><label>Phone</label><input type="tel" id="u-phone" placeholder="01X-XXXXXXX" inputmode="tel"></div>
                </div>

                <h3>2. Care Recipient</h3>
                <div class="input-group"><label>Recipient Name</label><input type="text" id="r-name"></div>
                <div class="grid-2">
                    <div class="input-group"><label>Date of Birth</label><input type="date" id="r-dob"></div>
                    <div class="input-group"><label>Gender</label>
                        <select id="r-gender">
                            <option>Male</option>
                            <option>Female</option>
                        </select>
                    </div>
                </div>
                <div class="input-group"><label>Weight (kg)</label><input type="number" id="r-weight" inputmode="decimal"></div>
                <div class="input-group"><label>Medical History / Meds</label><textarea id="c-meds" style="height:70px; padding-top:12px;"></textarea></div>

                <h3>3. Service Details</h3>
                <div class="input-group">
                    <label>Professional Type</label>
                    <select id="c-role" onchange="updatePrice()">
                        <option value="Caregiver">Caregiver — RM35/hr</option>
                        <option value="Nurse">Nurse — RM50/hr</option>
                        <option value="Doctor">Doctor — RM100/hr</option>
                    </select>
                </div>
                <div class="input-group"><label>Full Service Address</label><input type="text" id="r-address" placeholder="Unit, Street, Area"></div>
                
                <div class="grid-2">
                    <div class="input-group"><label>Emergency Name</label><input type="text" id="r-e-name"></div>
                    <div class="input-group"><label>Emergency Phone</label><input type="tel" id="r-e-phone" inputmode="tel"></div>
                </div>

                <h3>4. Booking Slots</h3>
                <div id="multi-list">
                    <div class="slot-row">
                        <div><label>Date & Time</label><input type="datetime-local" class="date-input-field" onchange="updatePrice()"></div>
                        <div><label>Hours</label><input type="number" class="hour-input-field" value="1" min="1" onchange="updatePrice()"></div>
                        <div></div>
                    </div>
                </div>
                <button class="btn-add" onclick="addSlot()">+ Add Another Slot</button>

                <div class="price-box">
                    <span>Estimated Total</span>
                    <div class="total-price" id="display-total">RM 35.00</div>
                </div>

                <button class="btn-submit" id="submit-btn" onclick="submitBooking()">Proceed to Payment</button>
            </div>
        </div>
    </div>

    <script>
        const QUICKBOOK_URL = "https://script.google.com/macros/s/AKfycbw80ZxUiTGztjxHmjoYcdrvBsRqLfqeVuCLCRxkP7-CqxcR5NjH646uXQHB_LYumvJB/exec";
        const RATES = { "Caregiver": 35, "Nurse": 50, "Doctor": 100 };

        function updatePrice() {
            const role = document.getElementById("c-role").value;
            const hours = Array.from(document.querySelectorAll(".hour-input-field")).reduce((sum, el) => sum + (parseFloat(el.value) || 0), 0);
            document.getElementById("display-total").innerText = `RM ${(hours * RATES[role]).toFixed(2)}`;
        }

        function setMinDate(el) {
            const d = new Date();
            d.setDate(d.getDate() + 3); 
            el.min = d.toISOString().slice(0, 16);
        }

        window.onload = () => {
            document.querySelectorAll(".date-input-field").forEach(setMinDate);
            updatePrice();
        };

        function addSlot() {
            const div = document.createElement("div");
            div.className = "slot-row";
            div.innerHTML = `
                <div><input type="datetime-local" class="date-input-field" onchange="updatePrice()"></div>
                <div><input type="number" class="hour-input-field" value="1" min="1" onchange="updatePrice()"></div>
                <button onclick="this.parentElement.remove(); updatePrice();" style="background:#1A1C20; color:#fff; border:none; height:52px; border-radius:12px; cursor:pointer;">✕</button>
            `;
            document.getElementById("multi-list").appendChild(div);
            setMinDate(div.querySelector(".date-input-field"));
            updatePrice();
        }

        async function submitBooking() {
            const btn = document.getElementById("submit-btn");
            
            // Map the slots exactly as the original logic
            const slots = Array.from(document.querySelectorAll(".date-input-field")).map((el, i) => {
                const h = document.querySelectorAll(".hour-input-field")[i].value;
                return el.value ? `${el.value} (${h}hrs)` : null;
            }).filter(v => v).join(" | ");

            if(!slots) return alert("Please select a date/time.");

            // Construct payload EXACTLY as the first working version
            const payload = {
                userName: document.getElementById("u-name").value,
                userEmail: document.getElementById("u-email").value,
                userPhone: document.getElementById("u-phone").value,
                recipientName: document.getElementById("r-name").value,
                recipientDob: document.getElementById("r-dob").value,
                weight: document.getElementById("r-weight").value,
                gender: document.getElementById("r-gender").value,
                state: "Selangor", // Matching original default
                address: document.getElementById("r-address").value,
                purpose: "Instant Booking", // Matching original
                meds: document.getElementById("c-meds").value,
                requestedRole: document.getElementById("c-role").value,
                emergencyName: document.getElementById("r-e-name").value,
                emergencyPhone: document.getElementById("r-e-phone").value,
                dates: slots
            };

            btn.innerText = "SAVING..."; btn.disabled = true;

            try {
                await fetch(QUICKBOOK_URL, { 
                    method: "POST", 
                    mode: "no-cors", 
                    body: JSON.stringify(payload) 
                });
                // Short delay to ensure browser doesn't kill the request before redirect
                setTimeout(() => { window.location.href = "https://buy.stripe.com/8x2eVe4Nv7kR9lp8gRgw00d"; }, 1000);
            } catch (e) {
                window.location.href = "https://buy.stripe.com/8x2eVe4Nv7kR9lp8gRgw00d";
            }
        }
    </script>
</body>
